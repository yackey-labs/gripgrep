name: tests

# Unit tests (-race) plus the rg golden e2e suite on every push/PR.
# The e2e suite byte-diffs gg against the exact rg version pinned in
# internal/bench/rg-version.txt — the suite's own TestMain refuses any
# other rg, so CI and every dev box verify against the same binary.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: go vet
        run: go vet ./... && go vet -tags e2e .
      - name: Unit tests (-race)
        run: go test ./... -race -count=1

  golden-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install pinned rg
        run: |
          RG_VERSION=$(tr -d '[:space:]' < internal/bench/rg-version.txt)
          asset="ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl"
          curl -fsSL "https://github.com/BurntSushi/ripgrep/releases/download/${RG_VERSION}/${asset}.tar.gz" | tar xz
          sudo install -m 0755 "${asset}/rg" /usr/local/bin/rg
          rg --version
      - name: Golden e2e suite vs rg
        run: go test -tags e2e -count=1 -v -run 'TestGoldenVsRipgrep|TestSortNormalization' . 2>&1 | tail -40
