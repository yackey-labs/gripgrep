name: autotag

# Automatic semver from conventional commits: on every push to main,
# inspect commits since the last v* tag and bump accordingly —
#   feat!: / BREAKING CHANGE  -> major
#   feat:                     -> minor
#   fix: / perf:              -> patch
#   anything else             -> no release
# When a bump is due, push the new tag and dispatch release.yml on the
# tag ref explicitly: tags created with the default GITHUB_TOKEN do NOT
# fire other workflows' `on: push: tags` triggers, so relying on that
# would silently publish nothing.
#
# First release bootstraps at v0.1.0 when no v* tag exists yet.

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

concurrency:
  group: autotag
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute bump
        id: bump
        shell: bash
        run: |
          last=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)
          if [ -n "$last" ]; then range="$last..HEAD"; else range="HEAD"; fi
          subjects=$(git log --format='%s' "$range")
          bodies=$(git log --format='%b' "$range")
          bump=none
          if echo "$subjects" | grep -qE '^[a-z]+(\([^)]*\))?!:' || echo "$bodies" | grep -q 'BREAKING CHANGE'; then
            bump=major
          elif echo "$subjects" | grep -qE '^feat(\([^)]*\))?:'; then
            bump=minor
          elif echo "$subjects" | grep -qE '^(fix|perf)(\([^)]*\))?:'; then
            bump=patch
          fi
          if [ "$bump" = none ]; then
            echo "no feat/fix/perf commits since ${last:-the beginning} — no release"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$last" ]; then
            next="v0.1.0"
          else
            IFS=. read -r maj min pat <<< "${last#v}"
            case "$bump" in
              major) next="v$((maj + 1)).0.0" ;;
              minor) next="v${maj}.$((min + 1)).0" ;;
              patch) next="v${maj}.${min}.$((pat + 1))" ;;
            esac
          fi
          echo "bump=$bump last=${last:-none} next=$next"
          echo "tag=$next" >> "$GITHUB_OUTPUT"
      - name: Tag and dispatch release
        if: steps.bump.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "gg $TAG (autotag from conventional commits)"
          git push origin "refs/tags/$TAG"
          gh workflow run release.yml --ref "refs/tags/$TAG"
